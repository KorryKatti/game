<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizard Duel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 0 auto; padding: 40px 20px; color: #ccc; background: #111; line-height: 1.6; }
    h1 { margin-bottom: 8px; color: #fff; }
    a { color: #6ea8fe; }
    hr { border: none; border-top: 1px solid #333; margin: 24px 0; }
    ul { padding-left: 20px; }
    li { margin-bottom: 4px; }
    .muted { color: #666; font-size: 14px; }
    .sprite {
      width: 77px;
      height: 77px;
      background-image: url('/spritesheet.png');
      background-repeat: no-repeat;
      background-size: 616px 308px;
      image-rendering: pixelated;
      animation: walk 0.8s steps(8) infinite;
      margin: 20px 0;
    }
    @keyframes walk {
      from { background-position: 0 0; }
      to { background-position: -616px 0; }
    }
  </style>
</head>
<body>
  <div class="sprite"></div>
  <h1>Wizard Duel</h1>
  <p>A 1v1 wizard duel game. Move with WASD, shoot with click, heal with right click. Simple to learn, hard to master.</p>

  <hr>

    <li><a href="/register.html">Sign Up</a></li>
    <li><a href="/login.html">Login</a></li>
    <li><a href="/dashboard.html">Dashboard</a> (API key, stats)</li>
    <li><a href="/leaderboard.html">Leaderboard</a></li>
    <li><a href="/docs.html">How to Play</a></li>
  </ul>

  <hr>

  <p class="muted">Made by <a href="https://korrykatti.github.io" target="_blank">korry</a></p>
</body>
</html>
