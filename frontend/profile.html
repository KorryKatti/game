<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile | Wizard Duel</title>
</head>
<body>
  <div id="nav-placeholder"></div>
  <main class="container" style="margin-top: 40px; max-width: 500px;">
    <h2 style="margin-bottom: 20px;">Profile</h2>
    <div class="card" id="profile-details">
      <div style="text-align: center; padding: 40px 0;">
        <div id="profile-avatar-placeholder" style="width: 80px; height: 80px; border-radius: 50%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 24px; margin: 0 auto 16px; color: #888;">
          WD
        </div>
        <h3 id="profile-username">Loading...</h3>
      </div>
      <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; text-align: center; margin-top: 16px;">
        <div>
          <div style="font-size: 11px; color: #888; margin-bottom: 4px;">ELO</div>
          <div style="font-size: 22px; font-weight: 700; color: #facc15;" id="profile-elo">-</div>
        </div>
        <div>
          <div style="font-size: 11px; color: #888; margin-bottom: 4px;">Wins</div>
          <div style="font-size: 22px; font-weight: 700; color: #4ade80;" id="profile-wins">-</div>
        </div>
        <div>
          <div style="font-size: 11px; color: #888; margin-bottom: 4px;">Losses</div>
          <div style="font-size: 22px; font-weight: 700; color: #f87171;" id="profile-losses">-</div>
        </div>
      </div>
      <hr>
      <p style="font-size: 12px; color: #666;">Playing since <span id="profile-created">-</span></p>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script type="module" src="/src/profile.js"></script>
</body>
</html>
