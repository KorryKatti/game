<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | Wizard Duel</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
</head>
<body>
    <div id="nav-placeholder"></div>
    <main class="container">
        <section class="fade-in">
            <div style="text-align: center; margin-bottom: var(--spacing-xl);">
                <h3 style="color: var(--color-gold-dim); font-size: 20px;">YOUR SANCTUM</h3>
                <div style="width: 40px; height: 1px; background: var(--color-gold-dim); margin: var(--spacing-md) auto;"></div>
            </div>
            <div class="card" id="profile-details" style="max-width: 500px; margin: 0 auto; text-align: center;">
                <div style="margin-bottom: var(--spacing-xl);">
                    <div id="profile-avatar-placeholder" style="width: 100px; height: 100px; border: 2px solid var(--color-gold-dim); margin: 0 auto var(--spacing-lg); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: 28px; background: var(--color-surface-raised); color: var(--color-gold-dim);">
                        WD
                    </div>
                    <h3 id="profile-username" style="font-size: 22px;">Loading...</h3>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-lg);">
                    <div>
                        <div style="font-family: var(--font-display); font-size: 10px; letter-spacing: 0.12em; color: var(--color-gold-dim); margin-bottom: 4px;">ELO</div>
                        <div class="font-mono" style="font-size: 24px; color: var(--color-gold);" id="profile-elo">-</div>
                    </div>
                    <div>
                        <div style="font-family: var(--font-display); font-size: 10px; letter-spacing: 0.12em; color: var(--color-teal-dim); margin-bottom: 4px;">WINS</div>
                        <div class="font-mono" style="font-size: 24px; color: var(--color-teal);" id="profile-wins">-</div>
                    </div>
                    <div>
                        <div style="font-family: var(--font-display); font-size: 10px; letter-spacing: 0.12em; color: var(--color-crimson-dim); margin-bottom: 4px;">LOSSES</div>
                        <div class="font-mono" style="font-size: 24px; color: var(--color-crimson);" id="profile-losses">-</div>
                    </div>
                </div>
                <hr>
                <div style="font-size: 12px; color: var(--color-text-dim);">
                    Initiated <span id="profile-created">-</span>
                </div>
            </div>
        </section>
    </main>
    <div id="footer-placeholder"></div>
    <script type="module" src="/src/profile.js"></script>
</body>
</html>
