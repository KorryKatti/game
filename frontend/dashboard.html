<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Wizard Duel</title>
  <style>
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
    @media (max-width: 768px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>
  <main class="container" style="margin-top: 40px;">
    <h2 style="margin-bottom: 4px;">Dashboard</h2>
    <p style="color: #888; font-size: 13px; margin-bottom: 20px;">Your API key and stats.</p>
    <div class="grid">
      <div class="card">
        <h3 style="font-size: 14px; margin-bottom: 12px;">Profile</h3>
        <div id="profile-summary" style="font-size: 13px; color: #888;">Loading...</div>
      </div>
      <div class="card">
        <h3 style="font-size: 14px; margin-bottom: 12px;">API Key</h3>
        <p style="font-size: 12px; color: #888; margin-bottom: 8px;">Paste into <code>wizard_api_key.txt</code> next to the game.</p>
        <div id="api-key-display" style="font-size: 11px; font-family: monospace; color: #888; word-break: break-all; background: #111; padding: 8px; border: 1px solid #2a2a2a; border-radius: 4px;">Loading...</div>
      </div>
      <div class="card">
        <h3 style="font-size: 14px; margin-bottom: 12px;">Stats</h3>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; text-align: center;">
          <div>
            <div style="font-size: 11px; color: #888;">ELO</div>
            <div style="font-size: 22px; font-weight: 700; color: #facc15;" id="stat-elo">-</div>
          </div>
          <div>
            <div style="font-size: 11px; color: #888;">Wins</div>
            <div style="font-size: 22px; font-weight: 700; color: #4ade80;" id="stat-wins">-</div>
          </div>
          <div>
            <div style="font-size: 11px; color: #888;">Losses</div>
            <div style="font-size: 22px; font-weight: 700; color: #f87171;" id="stat-losses">-</div>
          </div>
        </div>
      </div>
      <div class="card">
        <h3 style="font-size: 14px; margin-bottom: 12px;">Recent Duels</h3>
        <ul id="matches-list" style="display: flex; flex-direction: column;"></ul>
      </div>
    </div>
  </main>
  <div id="footer-placeholder"></div>
  <script type="module" src="/src/dashboard.js"></script>
</body>
</html>
