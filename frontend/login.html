<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Wizard Duel</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="nav-placeholder"></div>
  <main class="container" style="max-width: 400px; margin-top: 60px;">
    <h2 style="margin-bottom: 20px;">Login</h2>
    <form id="login-form">
      <div style="margin-bottom: 16px;">
        <label for="username">Username</label>
        <input type="text" id="username" required autocomplete="username">
      </div>
      <div style="margin-bottom: 16px;">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password">
      </div>
      <div id="error-message" style="color: #f87171; font-size: 13px; margin-bottom: 12px; display: none;"></div>
      <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>
    <p style="margin-top: 16px; font-size: 13px; color: #888;">
      No account? <a href="/register.html">Sign up</a>
    </p>
  </main>
  <div id="footer-placeholder"></div>
  <script type="module" src="/src/auth.js"></script>
</body>
</html>
