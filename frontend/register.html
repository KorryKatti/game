<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Minimalist Duelists</title>
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="stylesheet" href="/src/style.css">
  <style>
    .auth-container {
      max-width: 400px;
      margin: var(--spacing-xxl) auto;
      padding: var(--spacing-xl);
      border: 1px solid var(--color-border);
    }
    .form-group {
      margin-bottom: var(--spacing-md);
    }
    .form-group label {
      display: block;
      font-family: var(--font-display);
      font-size: 12px;
      margin-bottom: 4px;
    }
    .form-group input {
      width: 100%;
      padding: 8px;
      border: 1px solid var(--color-border);
      font-family: var(--font-body);
    }
    .auth-footer {
      margin-top: var(--spacing-lg);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <nav id="main-nav">
    <div class="container nav-content">
      <a href="/" class="font-mono" id="logo">MINIMALIST DUELISTS</a>
    </div>
  </nav>

  <main class="container">
    <div class="auth-container fade-in">
      <h3 style="margin-bottom: var(--spacing-lg);">JOIN THE ARENA</h3>
      <form id="register-form">
        <div class="form-group">
          <label for="username">USERNAME</label>
          <input type="text" id="username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">PASSWORD</label>
          <input type="password" id="password" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="avatar">AVATAR URL (OPTIONAL)</label>
          <input type="url" id="avatar" placeholder="https://imgur.com/...">
        </div>
        <div id="error-message" style="color: var(--color-red); font-size: 12px; margin-bottom: var(--spacing-md); display: none;"></div>
        <button type="submit" class="btn" style="width: 100%;">CREATE ACCOUNT</button>
      </form>
      <div class="auth-footer">
        ALREADY HAVE AN ACCOUNT? <a href="/login.html" style="text-decoration: underline;">LOGIN</a>
      </div>
    </div>
  </main>

  <script type="module" src="/src/auth.js"></script>
</body>
</html>
